<div class="rewards-page">

  <!-- HERO -->
  <div class="hero-card">
    <div class="overlay"></div>

    <div class="hero-content">
      <div class="top-badge">
        <span>🔥 NEW AGENT REWARD</span>
      </div>

      <h1>
        Invite Rewards
      </h1>

      <p>
        Complete team deposits and unlock premium cash rewards.
      </p>

      <div class="stats-row">
        <div class="stat-box">
          <span>Total Deposit</span>
          <h3>${{ totalDeposit }}</h3>
        </div>

        <div class="stat-box active">
          <span>Current Reward</span>
          <h3>${{ currentReward }}</h3>
        </div>
      </div>
    </div>
  </div>

  <!-- LEVELS -->
  <div class="levels-wrapper">

    <div
      class="level-card"
      *ngFor="let level of levels"
      [class.locked]="totalDeposit < level.required"
      [class.completed]="totalDeposit >= level.required">

      <!-- TOP -->
      <div class="card-top">

        <div class="level-info">
          <span class="level-tag">
            LEVEL {{ level.level }}
          </span>

          <h2>${{ level.reward }}</h2>

          <p>
            Need ${{ level.required }} Deposit
          </p>
        </div>

        <div
          class="lock-badge"
          [class.unlock]="totalDeposit >= level.required">

          <ng-container *ngIf="totalDeposit >= level.required">
            ✓
          </ng-container>

          <ng-container *ngIf="totalDeposit < level.required">
            🔒
          </ng-container>

        </div>

      </div>

      <!-- PROGRESS -->
      <div class="progress-wrapper">

        <div class="progress-labels">
          <span>${{ totalDeposit }}</span>
          <span>${{ level.required }}</span>
        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            [style.width.%]="getProgress(level.required)">
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
