<section *ngIf="walletService.storeData.store as store">


  <div *ngIf="store['wallet']?.['hasPin']; else noPin">

  <div *ngIf="!walletService.quickNav.storeData.store['withdraw']?.length; else hasInvoice"
       class="crypto-withdraw">

    <!-- 🔷 NETWORK SELECT (same as deposit) -->
    <div class="network-select">
      <div
        *ngFor="let curr of walletService.getVisibleCrptoNetwork([0,2]); let i=index"
        class="network-chip"
        [class.active]="walletService.selectedCryptoMethod === curr.code"
        (click)="walletService.selectedCryptoMethod = curr.code">

        <img [src]="walletService.cryptos[i].img">
        <span>{{ walletService.cryptos[i].label }}</span>
      </div>
    </div>

    <!-- 🔶 MAIN CARD -->
    <div *ngIf="store['wallet']?.saved_add&&!walletService.editingAddress;else noSavedAdd;else noSavedAdd"
         class="">

      <!-- FORM -->
      <div *ngIf="walletService.formView.crypto.withdraw as form">

        <form
            class="my-form"
            [formGroup]="form"
            (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')"
          >

            <!-- AMOUNT -->
            <div class="premium-field">

              <label>
                Withdraw Amount
              </label>

              <div class="amount-input form-control">

                <input
                  formControlName="amount"
                  type="number"
                  [min]="walletService.minimumPayment"
                  placeholder="0.00"
                >

                <div class="currency-pill">
                  {{ walletService.selectedData.symbol }}
                </div>

              </div>

              <div class="field-info">

                <span>
                  Minimum Withdrawal
                </span>

                <strong>
                  {{walletService.selectedData.symbol}}
                  {{walletService.minimumPayment | number:'1.2-2'}}
                </strong>

              </div>

            </div>

            <!-- WITHDRAW TO -->
            <div class="premium-field">

              <label>
                Withdraw To
              </label>

              <div class="premium-select-wrap">

                <select formControlName="saved_method_id">

                  <!-- <option value="">
                    Select wallet address
                  </option> -->

                  <option
                    *ngFor="let add of store['wallet'].saved_add"
                  >
                    {{ add.account_number | truncateCenter:20 }}
                  </option>

                </select>

                <div class="select-icon">
                  ⌄
                </div>

              </div>

              <small
                class="edit-link"
                (click)="walletService.editingAddress=true"
              >
                Manage Addresses
              </small>

            </div>

            <!-- WITHDRAW FROM -->
            <div
              *ngIf="walletService.withdraw_options.length"
              class="premium-field"
            >

              <label>
                Withdraw From
              </label>

              <div class="premium-select-wrap">

                <select formControlName="withdraw_option">

                  <option value="">
                    Choose balance source
                  </option>

                  <option
                    *ngFor="let opp of walletService.withdraw_options"
                    [value]="opp[0]"
                  >
                    {{ opp[1] }}
                  </option>

                </select>

                <div class="select-icon">
                  ⌄
                </div>

              </div>

            </div>

            <!-- BUTTON -->
            <button
              type="submit"
              class="form-btn"
              [disabled]="!form.valid"
            >

              <span>
                Confirm Withdrawal
              </span>

              <div class="btn-arrow">
                →
              </div>

            </button>

          </form>

      </div>

  </div>

  </div>

</div>

 <ng-template #noPin>
   <app-create-pin></app-create-pin>
 </ng-template>
 <ng-template  #noSavedAdd>

   <div *ngIf="walletService.formView.crypto.payment_info as form" class="mt-4">
     <form [formGroup]="form" (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')" class="crypto-acc my-form" >

       <p class="text-white" *ngIf="!store['wallet']?.saved_add"><strong>Save your payment address!</strong></p>
       <div *ngIf="store['wallet']?.saved_add" class="">
         <span (click)='walletService.editingAddress=false' class="text-right text-main"><i class="fa fa-close"></i></span>
         <p class="text-white" ><strong>Edit payment adddress!</strong></p>

       </div>

       <div class="premium-field">
         <label>Wallet Address</label>

         <div class="form-control">
           <input formControlName="account_number"  type="text"  placeholder="{{walletService.getCryptoLabel(walletService.selectedCryptoMethod)}}">
         </div>
       </div>

       <div class="premium-field">
         <label>Enter Pin</label>
         <div class="form-control ">
           <input
               formControlName="pin"
               type="number"
               placeholder="{{store['wallet']?.hasPin?.length}} digit transaction pin"
               >
         </div>
       </div>


         <button
           type="submit"
           class="form-btn"
           [disabled]="!form.valid"
         >

           <span>
             Send
           </span>

           <div class="btn-arrow">
             →
           </div>

         </button>

     </form>

   </div>


 </ng-template>

 <ng-template #hasInvoice>
   <app-withdraw-invoice></app-withdraw-invoice>
 </ng-template>

</section>
