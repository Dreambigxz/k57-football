<section *ngIf="walletService.storeData.store as store">


  <div *ngIf="store['wallet']?.['hasPin']; else noPin">

  <div *ngIf="!walletService.quickNav.storeData.store['withdraw']?.length; else hasInvoice"
       class="crypto-withdraw">

    <!-- 🔷 NETWORK SELECT (same as deposit) -->
    <div class="network-select">
      <div
        *ngFor="let curr of walletService.getVisibleCrptoNetwork([0,2]); let i=index"
        class="network-chip"
        [class.active]="walletService.selectedCryptoMethod === curr.code"
        (click)="walletService.selectedCryptoMethod = curr.code">

        <img [src]="walletService.cryptos[i].img">
        <span>{{ walletService.cryptos[i].label }}</span>
      </div>
    </div>

    <!-- 🔶 MAIN CARD -->
    <div *ngIf="store['wallet']?.saved_add&&!walletService.editingAddress;else noSavedAdd;else noSavedAdd"
         class="">

      <!-- FORM -->
      <div *ngIf="walletService.formView.crypto.withdraw as form">

        <form [formGroup]="form"
              (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')">

          <!-- AMOUNT -->
          <div class="amount-box">
            <input
              formControlName="amount"
              type="number"
              [min]="walletService.minimumPayment"
              placeholder="Enter amount">

            <span class="currency">
              {{walletService.selectedData.symbol}}
            </span>
          </div>

          <!-- MIN -->
          <div class="amount-info">
            <span>Minimum</span>
            <strong>
              {{walletService.selectedData.symbol}}
              {{walletService.minimumPayment | number:'1.2-2'}}
            </strong>
          </div>

          <!-- SELECT ADDRESS -->
          <div style="margin-top:12px;" class="account-select">
            <span>Wallet</span>

            <select formControlName="saved_method_id">
              <option *ngFor="let add of store['wallet'].saved_add">
                {{ add.account_number | truncateCenter:20 }}
              </option>
            </select>

            <small style="  color: #ff9800;" (click)="walletService.editingAddress=true">
              Edit
            </small>
          </div>

          <!-- CTA -->
          <button type="submit" [disabled]="!form.valid">
            Withdraw →
          </button>


        </form>

      </div>

  </div>

  </div>

</div>

 <ng-template #noPin>
   <app-create-pin></app-create-pin>
 </ng-template>
 <ng-template  #noSavedAdd>

   <div *ngIf="walletService.formView.crypto.payment_info as form" class="mt-4">
     <form [formGroup]="form" (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')" class="form form--content crypto-acc" >

       <p *ngIf="!store['wallet']?.saved_add"><strong>Save your payment address!</strong></p>
       <div *ngIf="store['wallet']?.saved_add" class="">
         <span (click)='walletService.editingAddress=false' class="text-right text-main"><i class="fa fa-close"></i></span>
         <p ><strong>Edit payment adddress!</strong></p>

       </div>


       <div class="form__group">
         <input formControlName="account_number"  type="text" class="form__input" placeholder="{{walletService.getCryptoLabel(walletService.selectedCryptoMethod)}} Wallet Address">
       </div>

       <div class="form__group ">
         <label for="pool1" class="apool__label">Enter Pin</label>
         <input
             formControlName="pin"
             type="number"
             class="form__input"
             placeholder="{{store['wallet']?.hasPin?.length}} digit transaction pin"
             >
       </div>

       <button class="form__btn" type="submit" [disabled]="!form.valid">SEND</button>


     </form>

   </div>


 </ng-template>

 <ng-template #hasInvoice>
   <app-withdraw-invoice></app-withdraw-invoice>
 </ng-template>

</section>
