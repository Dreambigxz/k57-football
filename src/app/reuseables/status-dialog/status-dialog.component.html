<div class="premium-dialog">

  <!-- GLOW -->
  <div class="dialog-glow"></div>

  <!-- ICON -->
  <div
    class="status-icon"
    [ngClass]="data.status"
  >

    <div class="icon-ring"></div>

    <div class="status-symbol">

      {{
        data.status === 'success'
          ? '✅'
          : '🚫'
      }}

    </div>

  </div>

  <!-- CONTENT -->
  <div class="dialog-content">

    <h2 class="dialog-title">
      {{ data.title }}
    </h2>

    <p class="dialog-message">
      {{ data.message }}
    </p>

  </div>

  <!-- ACTION -->
  <div class="dialog-actions">

    <button
      mat-button
      class="btn-confirm"
      (click)="reloadPage()"
    >

      <span>
        Refresh
      </span>

      <div class="btn-icon">
        ↻
      </div>

    </button>

  </div>

</div>
