<app-header2></app-header2>
<app-spinner></app-spinner>

<div *ngIf="storeData.store['notification'] as notifications" class="notif-page">

  <!-- TOP SWITCH -->
  <div class="notif-switch">
    <div
      class="switch-item"
      [class.active]="activeTab==='unseen'"
      (click)="activeTab='unseen'">

      Unread
      <span class="count">{{notifications.unseen_read?.length || 0}}</span>
    </div>

    <div
      class="switch-item"
      [class.active]="activeTab==='seen'"
      (click)="activeTab='seen'">

      Seen
      <span class="count">{{notifications.seen?.length || 0}}</span>
    </div>
  </div>

  <!-- LIST -->
  <div class="notif-feed">

    <ng-container *ngIf="activeTab==='unseen'; else seenBlock">

      <div class="notif-item unread" *ngFor="let n of notifications.unseen_read">

        <div class="notif-dot"></div>

        <div class="notif-body">

          <div class="notif-head">
            <span class="title">{{n.header}}</span>
            <span class="time">{{n.timestamp | date:'MMM d, HH:mm'}}</span>
          </div>

          <div class="message" [innerHTML]="n.message"></div>

          <div class="help" *ngIf="n.help">
            {{n.help}}
          </div>

        </div>

      </div>

      <!-- EMPTY -->
      <div *ngIf="!notifications.unseen_read?.length" class="empty-state">
        <img src="assets/images/empty-box.png">
        <p>No unread notifications</p>
      </div>

    </ng-container>

    <!-- SEEN -->
    <ng-template #seenBlock>
      <div class="notif-item seen" *ngFor="let n of notifications.seen">

        <div class="notif-body">

          <div class="notif-head">
            <span class="title">{{n.header}}</span>
            <span class="time">{{n.timestamp | date:'MMM d, HH:mm'}}</span>
          </div>

          <div class="message" [innerHTML]="n.message"></div>

          <div class="help" *ngIf="n.help">
            {{n.help}}
          </div>

        </div>

      </div>
    </ng-template>

  </div>

</div>
