<div *ngIf="walletService.quickNav.storeData.store['wallet']?.['hasPin']; else noPin">

  <div *ngIf="walletService.quickNav.storeData.store['deposit']" class="deposit-card">

    <!-- NETWORK SELECT -->
    <div class="network-select">
      <div
        *ngFor="let curr of walletService.getVisibleCrptoNetwork([0,2]); let i=index"
        class="network-chip"
        [class.active]="walletService.selectedCryptoMethod === curr.code"
        (click)="walletService.selectedCryptoMethod = curr.code">

        <img [src]="walletService.cryptos[i].img" alt="">
        <span>{{ walletService.cryptos[i].label }}</span>
      </div>
    </div>

    <!-- QR + ADDRESS BLOCK -->
    <div class="deposit-box">

      <!-- QR -->
      <div class="qr-box">
        <img [src]="'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + payAddress" />
      </div>

      <!-- ADDRESS -->
      <div class="address-box">
        <span class="addr">{{ payAddress | truncateCenter:18 }}</span>
        <button (click)="walletService.quickNav.copy(payAddress, 'Address copied')" class="copy-btn">
          Copy
        </button>
      </div>

      <!-- MIN -->
      <div class="min-box">
        <span>Min Deposit</span>
        <strong>
          {{ walletService.selectedData?.symbol }}
          {{ walletService.minimumPayment | number:'1.2-2' }}
        </strong>
      </div>

    </div>

    <!-- NOTICE -->
    <div class="notice">
      ⚠ Only send supported assets to this address.
      Confirm transaction on the network before contacting support.
    </div>

  </div>

</div>

<ng-template #noPin>
  <app-create-pin></app-create-pin>
</ng-template>
