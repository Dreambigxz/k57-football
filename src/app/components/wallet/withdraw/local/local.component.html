
<section *ngIf="walletService.storeData.store as store">
  <div *ngIf="store['wallet']?.['hasPin'];else noPin"  class="hasPin">


    <div *ngIf="!walletService.quickNav.storeData.store['withdraw']?.length;else hasInvoice">

      <div class="method-grid">

        <div
          *ngFor="let curr of walletService.getVisibleCurrencies()"
          class="method-chip"
          [class.active]="walletService.selectedLocaLMethod === curr.code"
          (click)="walletService.selectedLocaLMethod = curr.code">

          <div class="icon">
            <span *ngIf="['XOF'].includes(curr.code)">🌍</span>
            <img *ngIf="!['XOF'].includes(curr.code)" [src]="makeFlag(curr.code)">
          </div>

          <div class="meta">
            <div class="code">{{ curr.code }}</div>
            <div class="sub">{{ curr.name }}</div>
          </div>

        </div>

      </div>

      <div *ngIf="walletService.selectedLocaLMethod" class="withdraw-card">

        <div *ngIf="store['wallet']?.saved_add&&!walletService.editingAddress;else noSavedAdd" class="">

            <form
              *ngIf="walletService.formView.local.withdraw as form"
              [formGroup]="form"
              (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')"
              class="my-form">

              <!-- AMOUNT -->
              <div class="premium-field">
                <div class="form-control">
                  <input
                    formControlName="amount"
                    type="number"
                    [min]="walletService.minimumPayment"
                    placeholder="Enter amount">

                  <span class="currency-pill">
                    {{walletService.selectedData.symbol}}
                  </span>
                </div>
              </div>

              <!-- MIN -->
              <div class="field-info">

                <span>
                  Minimum Withdrawal
                </span>

                <strong>
                  {{walletService.selectedData.symbol}}
                  {{walletService.minimumPayment | number:'1.2-2'}}
                </strong>

              </div>

              <!-- WITHDRAW TO -->
              <div class="premium-field">

                <label>
                  Withdraw To
                </label>

                <div class="premium-select-wrap">

                  <select formControlName="saved_method_id">

                    <!-- <option value="">
                      Select wallet address
                    </option> -->

                    <option
                      *ngFor="let add of store['wallet'].saved_add"
                    >
                      {{ add.account_number | truncateCenter:20 }}
                    </option>

                  </select>

                  <div class="select-icon">
                    ⌄
                  </div>

                </div>

                <small
                  class="edit-link"
                  (click)="walletService.editingAddress=true"
                >
                  Manage Addresses
                </small>

              </div>

              <!-- WITHDRAW FROM -->
              <div
                *ngIf="walletService.withdraw_options.length"
                class="premium-field"
              >

                <label>
                  Withdraw From
                </label>

                <div class="premium-select-wrap">

                  <select formControlName="withdraw_option">

                    <option value="">
                      Choose balance source
                    </option>

                    <option
                      *ngFor="let opp of walletService.withdraw_options"
                      [value]="opp[0]"
                    >
                      {{ opp[1] }}
                    </option>

                  </select>

                  <div class="select-icon">
                    ⌄
                  </div>

                </div>

              </div>

              <!-- BUTTON -->
              <button
                type="submit"
                class="form-btn"
                [disabled]="!form.valid"
              >

                <span>
                  Confirm Withdrawal
                </span>

                <div class="btn-arrow">
                  →
                </div>

              </button>

            </form>

          </div>
        </div>

    </div>
  </div>
  <ng-template #noPin>
    <app-create-pin></app-create-pin>
  </ng-template>

  <ng-template  #noSavedAdd>

    <div *ngIf="walletService.formView.local.payment_info as form">
      <form [formGroup]="form" (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')" class=" local-acc" >

        <p class="text-white" *ngIf="!store['wallet']?.saved_add"><strong>Save your payment address!</strong></p>

        <div class="my-form">

          <div *ngIf="store['wallet']?.saved_add" class="">
            <span (click)='walletService.editingAddress=false' class="text-right text-main"><i class="fa fa-close"></i></span>
            <p class="text-white"><strong>Edit payment adddress!</strong></p>

          </div>



          <!-- SELECT BANK-->
          <div class="premium-field">

            <label>
              Bank
            </label>

            <div class="premium-select-wrap">

              <select
                formControlName="bank">

                <option value="" disabled selected>
                  Select Bank
                </option>

                <option
                  *ngFor="let bank of banks"
                  value="{{bank.name}} - {{bank.code}}">

                  {{ bank.name }}

                </option>

              </select>

              <div class="select-icon">
                ⌄
              </div>

            </div>
          </div>

        <div class="premium-field">
          <label>Account Name</label>

          <div class="form-control">
            <input formControlName='account_holder'  type="text" placeholder="Beneficiary" >
          </div>
        </div>


        <div class="premium-field">
          <label>Account Number</label>

            <div class="form-control">
              <input formControlName="account_number"  type="text" placeholder=" 775858***" >
            </div>

        </div>
          <div class="premium-field ">
            <label>Enter Pin</label>

          <div class="form-control">
            <input
                formControlName="pin"
                type="number"
                placeholder="{{store['wallet']?.hasPin?.length}} digit transaction pin"
                >
          </div>
          </div>

            <button
              type="submit"
              class="form-btn"
              [disabled]="!form.valid"
            >

              <span>
                Send
              </span>

              <div class="btn-arrow">
                →
              </div>

            </button>

        </div>


      </form>

    </div>


  </ng-template>
  <ng-template #hasInvoice>
    <app-withdraw-invoice></app-withdraw-invoice>
  </ng-template>

</section>
