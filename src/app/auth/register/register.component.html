<app-spinner></app-spinner>

<!-- PAGE -->
<div class="football-auth">

  <!-- BG EFFECT -->
  <div class="stadium-glow"></div>
  <div class="ball ball1"></div>
  <div class="ball ball2"></div>

  <!-- CARD -->
  <form
    class="auth-card"
    [formGroup]="authService.formView.register"
    (ngSubmit)="authService.onSubmit(authService.formView.register,'register')">

    <!-- TOP -->
    <div class="auth-top">

      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="/assets/img/vi.svg" alt="">
        </div>
      </div>

      <h2>Create Account</h2>

      <p class="subtitle">
        Join the premium football prediction experience
      </p>

    </div>

    <!-- LANGUAGE -->
    <div class="input-box">

      <label>Language</label>

      <div class="input-wrap">
        <i class="fa fa-globe"></i>

        <select
          class="lang-select"
          (change)="quickNav.changeLanguage($event)">

          <option disabled selected>
            Change language
          </option>

          <option
            *ngFor="let lang of quickNav.langKeys"
            [value]="lang">

            {{ lang }}

          </option>

        </select>

      </div>

    </div>

    <!-- USERNAME -->
    <div class="input-box">

      <label>Username</label>

      <div class="input-wrap">
        <i class="fa fa-user"></i>

        <input
          formControlName="username"
          type="text"
          placeholder="Enter nickname">
      </div>

    </div>

    <!-- EMAIL -->
    <div class="input-box">

      <label>Email Address</label>

      <div class="input-wrap">
        <i class="fa fa-envelope"></i>

        <input
          formControlName="email"
          type="email"
          placeholder="Enter your email">
      </div>

    </div>

    <!-- REF CODE -->
    <div class="input-box">

      <label>Invite Code</label>

      <div class="input-wrap">
        <i class="fa fa-ticket"></i>

        <input
          formControlName="RefCode"
          type="text"
          placeholder="Optional invite code">
      </div>

    </div>

    <!-- PASSWORD -->
    <div class="input-box">

      <label>Password</label>

      <div class="input-wrap">

        <i class="fa fa-lock"></i>

        <input
          formControlName="password"
          [type]="authService.showPassword ? 'text' : 'password'"
          placeholder="Create password">

        <span
          class="eye-btn"
          (click)="authService.togglePassword()">

          <i
            class="fa"
            [ngClass]="authService.showPassword ? 'fa-eye-slash' : 'fa-eye'">
          </i>

        </span>

      </div>

      <div
        class="error"
        *ngIf="authService.formView.register.get('password')?.touched
        && authService.formView.register.get('password')?.errors?.['minlength']">

        Password must be at least 6 characters

      </div>

    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-box">

      <label>Confirm Password</label>

      <div class="input-wrap">

        <i class="fa fa-shield"></i>

        <input
          formControlName="confirm_password"
          [type]="authService.showPassword ? 'text' : 'password'"
          placeholder="Confirm password">

      </div>

      <div
        class="error"
        *ngIf="authService.formView.register.errors?.['passwordMismatch']
        && authService.formView.register.get('confirm_password')?.touched">

        Passwords do not match

      </div>

    </div>

    <!-- BUTTON -->
    <button
      type="submit"
      class="auth-btn"
      [disabled]="authService.formView.register.invalid">

      Join Now →

    </button>

    <!-- FOOTER -->
    <div class="auth-footer">

      Already have an account?

      <span (click)="authService.router.navigate(['/login'])">
        Login
      </span>

    </div>

    <!-- FOOTBALL DECOR -->
    <div class="pitch-lines"></div>

  </form>

</div>
