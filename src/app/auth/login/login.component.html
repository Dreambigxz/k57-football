<app-spinner></app-spinner>

<!-- PAGE -->
<div class="football-auth">

  <!-- BG EFFECT -->
  <div class="stadium-glow"></div>
  <div class="ball ball1"></div>
  <div class="ball ball2"></div>

  <!-- CARD -->
  <form
    class="auth-card"
    [formGroup]="authService.formView.login"
    (ngSubmit)="authService.onSubmit(authService.formView.login,'login')">

    <!-- TOP -->
    <div class="auth-top">

      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="/assets/img/vi.svg" alt="">
        </div>
      </div>

      <h2>Welcome Back</h2>

      <p class="subtitle">
        Login to continue your football journey
      </p>

    </div>

    <!-- LANGUAGE -->
    <div class="input-box">

      <label>Language</label>

      <div class="input-wrap">

        <i class="fa fa-globe"></i>

        <select
          class="lang-select"
          (change)="quickNav.changeLanguage($event)">

          <option disabled selected>
            Change language
          </option>

          <option
            *ngFor="let lang of quickNav.langKeys"
            [value]="lang">

            {{ lang }}

          </option>

        </select>

      </div>

    </div>

    <!-- USERNAME -->
    <div class="input-box">

      <label>Username</label>

      <div class="input-wrap">

        <i class="fa fa-user"></i>

        <input
          formControlName="identifier"
          type="text"
          placeholder="Enter username">

      </div>

    </div>

    <!-- PASSWORD -->
    <div class="input-box">

      <label>Password</label>

      <div class="input-wrap">

        <i class="fa fa-lock"></i>

        <input
          formControlName="password"
          [type]="authService.showPassword ? 'text' : 'password'"
          placeholder="Enter password">

        <span
          class="eye-btn"
          (click)="authService.togglePassword()">

          <i
            class="fa"
            [ngClass]="authService.showPassword ? 'fa-eye-slash' : 'fa-eye'">
          </i>

        </span>

      </div>

    </div>

    <!-- REMEMBER -->
    <div class="remember-wrap">

      <label class="remember-box">

        <input type="checkbox">

        <span class="checkmark"></span>

        Remember Me

      </label>

    </div>

    <!-- BUTTON -->
    <button
      type="submit"
      class="auth-btn"
      [disabled]="authService.formView.login.invalid">

      Sign In →

    </button>

    <!-- FOOTER -->
    <div class="auth-footer">

      Don't have an account?

      <span (click)="authService.router.navigate(['/sign-up'])">
        Sign Up
      </span>

      <br>

      <a
        class="forgot-link"
        (click)="authService.router.navigate(['/reset-password'])">

        Forgot password?

      </a>

    </div>

    <!-- FOOTBALL DECOR -->
    <div class="pitch-lines"></div>

  </form>

</div>
