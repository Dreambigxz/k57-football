<app-spinner></app-spinner>

<!-- PAGE -->
<div class="football-auth">

  <!-- BG EFFECT -->
  <div class="stadium-glow"></div>
  <div class="ball ball1"></div>
  <div class="ball ball2"></div>

  <!-- CARD -->
  <form
    class="auth-card"
    [formGroup]="authService.formView.reset"
    (ngSubmit)="authService.onSubmit(authService.formView.reset,'forgot-password')">

    <!-- TOP -->
    <div class="auth-top">

      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="/assets/img/vi.svg" alt="">
        </div>
      </div>

      <h2>Reset Password</h2>

      <p class="subtitle">
        Enter your registered email to receive a reset link
      </p>

    </div>

    <!-- INPUT -->
    <div class="input-box">

      <label>Email Address</label>

      <div class="input-wrap">
        <i class="fa fa-envelope"></i>

        <input
          formControlName="email"
          type="email"
          placeholder="Enter your email">
      </div>

    </div>

    <!-- BUTTON -->
    <button
      type="submit"
      class="auth-btn"
      [disabled]="authService.formView.reset.invalid">

      Send Reset Link →
    </button>

    <!-- FOOTER -->
    <div class="auth-footer">
      Remember password?
      <span (click)="authService.router.navigate(['/login'])">
        Login
      </span>
    </div>

    <!-- FOOTBALL DECOR -->
    <div class="pitch-lines"></div>

  </form>

</div>
