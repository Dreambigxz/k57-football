
<section *ngIf="walletService.storeData.store as store">
  <div *ngIf="store['wallet']?.['hasPin'];else noPin"  class="hasPin">


    <div *ngIf="!walletService.quickNav.storeData.store['withdraw']?.length;else hasInvoice">

      <div class="method-grid">

        <div
          *ngFor="let curr of walletService.getVisibleCurrencies()"
          class="method-chip"
          [class.active]="walletService.selectedLocaLMethod === curr.code"
          (click)="walletService.selectedLocaLMethod = curr.code">

          <div class="icon">
            <span *ngIf="['XOF'].includes(curr.code)">🌍</span>
            <img *ngIf="!['XOF'].includes(curr.code)" [src]="makeFlag(curr.code)">
          </div>

          <div class="meta">
            <div class="code">{{ curr.code }}</div>
            <div class="sub">{{ curr.name }}</div>
          </div>

        </div>

      </div>

      <div *ngIf="walletService.selectedLocaLMethod" class="withdraw-card">

        <div *ngIf="store['wallet']?.saved_add&&!walletService.editingAddress;else noSavedAdd" class="">

            <form
              *ngIf="walletService.formView.local.withdraw as form"
              [formGroup]="form"
              (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')">

              <!-- AMOUNT -->
              <div class="amount-box">
                <input
                  formControlName="amount"
                  type="number"
                  [min]="walletService.minimumPayment"
                  placeholder="Enter amount">

                <span class="currency">
                  {{walletService.selectedData.symbol}}
                </span>
              </div>

              <!-- MIN -->
              <div class="amount-info">
                <span>Minimum</span>
                <strong>
                  {{walletService.selectedData.symbol}}
                  {{walletService.minimumPayment | number:'1.2-2'}}
                </strong>
              </div>

              <!-- ACCOUNT -->
              <div class="account-select">
                <span>Receive address</span>

                <select formControlName="saved_method_id">
                  <option *ngFor="let add of store['wallet'].saved_add">
                    {{add.account_number}} - {{add.account_holder}} - {{add.bank.text}}
                  </option>
                </select>

                <small (click)="walletService.editingAddress=true">Edit</small>
              </div>

              <!-- CTA -->
              <button type="submit" [disabled]="!form.valid">
                Withdraw →
              </button>

            </form>

          </div>
        </div>

    </div>
  </div>
  <ng-template #noPin>
    <app-create-pin></app-create-pin>
  </ng-template>

  <ng-template  #noSavedAdd>

    <div *ngIf="walletService.formView.local.payment_info as form">
      <form [formGroup]="form" (ngSubmit)="walletService.handleSubmit(form, 'create_withdraw')" class="form form--content local-acc" >

        <p *ngIf="!store['wallet']?.saved_add"><strong>Save your payment address!</strong></p>
        <div *ngIf="store['wallet']?.saved_add" class="">
          <span (click)='walletService.editingAddress=false' class="text-right text-main"><i class="fa fa-close"></i></span>
          <p ><strong>Edit payment adddress!</strong></p>

        </div>

        <div class="form__group">
          <input formControlName="bank"  type="text" class="form__input" placeholder="BANK NAME" [value]="store['wallet']?.saved_add[0].bank.text">
        </div>
        <div class="form__group">
          <input formControlName='account_holder'  type="text" class="form__input" placeholder="ACCOUNT NAME" [value]="store['wallet']?.saved_add[0].account_holder">
        </div>
        <div class="form__group">
          <input formControlName="account_number"  type="text" class="form__input" placeholder=" ACCOUNT NUMBER" [value]="store['wallet']?.saved_add[0].account_number">
        </div>

        <div class="form__group ">
          <label for="pool1" class="apool__label">Enter Pin</label>
          <input
              formControlName="pin"
              type="number"
              class="form__input"
              placeholder="{{store['wallet']?.hasPin?.length}} digit transaction pin"
              >
        </div>

        <button class="form__btn" type="submit" [disabled]="!form.valid">SEND</button>


      </form>

    </div>


  </ng-template>
  <ng-template #hasInvoice>
    <app-withdraw-invoice></app-withdraw-invoice>
  </ng-template>

</section>
