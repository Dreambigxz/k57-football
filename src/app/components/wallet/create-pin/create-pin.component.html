<div class="set-pin">

    <div class="premium-field">
      <label for="pool1" class="">Security pin</label>
      <p>Pin would be required for withdrawal </p>
      <div class="form-control">
        <input
            [(ngModel)]="transactionPin"
            type="number"
            placeholder="4 - 6 digit transaction pin"
            >
      </div>

      <button (click)="createPin()" [disabled]="!transactionPin"  class="form-btn" >
        Send →
      </button>

      </div>


</div>
